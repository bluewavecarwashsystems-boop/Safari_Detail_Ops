<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Background circle in Safari Sand -->
  <circle cx="150" cy="150" r="150" fill="#FAF6EF"/>
  
  <!-- Safari Sun/Horizon -->
  <circle cx="150" cy="150" r="80" fill="#F47C20"/>
  <path d="M 70 150 Q 150 130, 230 150" stroke="#FFFFFF" stroke-width="8" fill="none"/>
  <path d="M 70 160 Q 150 140, 230 160" stroke="#FFFFFF" stroke-width="8" fill="none"/>
  <path d="M 70 170 Q 150 150, 230 170" stroke="#FFFFFF" stroke-width="8" fill="none"/>
  
  <!-- Acacia Tree Silhouettes -->
  <g fill="#5A3E2B" opacity="0.9">
    <!-- Left tree -->
    <rect x="90" y="170" width="4" height="25"/>
    <ellipse cx="92" cy="165" rx="25" ry="12"/>
    
    <!-- Right tree -->
    <rect x="205" y="175" width="4" height="20"/>
    <ellipse cx="207" cy="170" rx="20" ry="10"/>
  </g>
  
  <!-- Text: SAFARI -->
  <text x="150" y="50" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="bold" fill="#5A3E2B" text-anchor="middle" letter-spacing="2">SAFARI</text>
  
  <!-- Text: CAR WASH -->
  <rect x="75" y="215" width="150" height="30" fill="#1F8A5B" rx="4"/>
  <text x="150" y="235" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FAF6EF" text-anchor="middle" letter-spacing="1">CAR WASH</text>
  
  <!-- Text: Full Service -->
  <text x="150" y="265" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#5A3E2B" text-anchor="middle" letter-spacing="3">FULL SERVICE</text>
</svg>
